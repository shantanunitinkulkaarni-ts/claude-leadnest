name: Nurture Cron

# Drives Convorian's follow-up engine. Vercel Hobby allows only ONE cron run
# per day, but our in-window nudges (3h/10h/23h) + appointment reminders need
# a frequent tick. This free GitHub Action calls the same protected /api/cron
# route every 15 minutes. The route is idempotent (per-lead counters/timestamps)
# and gated by quiet hours (9 AM–8 PM IST), so extra ticks are safe no-ops.
#
# SETUP (one-time, founder):
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#   Name:  CRON_SECRET   Value: the same value as CRON_SECRET in Vercel env.
#   (Optional) CRON_URL if the domain ever changes; defaults to convorian.in.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes (UTC); route enforces IST quiet hours
  workflow_dispatch:           # run on demand from the Actions tab

# Avoid overlapping runs if one is slow.
concurrency:
  group: nurture-cron
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Verify secret is set
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi

      - name: Call /api/cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_URL: ${{ secrets.CRON_URL }}
        run: |
          url="${CRON_URL:-https://convorian.in/api/cron}"
          echo "Pinging $url"
          code=$(curl -sS -o /tmp/cron_out.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" "$url" || echo "000")
          echo "HTTP $code"
          cat /tmp/cron_out.json || true
          echo
          # 2xx = success. Anything else fails the run so it shows up red.
          case "$code" in
            2*) echo "Cron ok" ;;
            *) echo "::error::Cron call failed with HTTP $code"; exit 1 ;;
          esac
