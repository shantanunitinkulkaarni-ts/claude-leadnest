name: CI

# Runs on every PR and on pushes to main. Catches type errors, lint issues,
# and broken critical flows before they reach production.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        # The app's middleware builds a Supabase client on every request and
        # throws if the URL/key are empty — so the dev server needs *some*
        # values to boot. We fall back to harmless dummy values when repo
        # secrets aren't set: the smoke tests only render pages and the API
        # tests exercise validation guards that return before any real DB call.
        # The bot live-call test auto-skips when GROQ_API_KEY is absent.
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy-anon-key' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
