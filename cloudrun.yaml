apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: leadnest
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/gen-lang-client-0794202345/leadnest:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: GOOGLE_CLOUD_PROJECT
              value: gen-lang-client-0794202345
            - name: VERTEX_REGION
              value: us-east5
